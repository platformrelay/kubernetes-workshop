name: Deploy to GitHub Pages

# Publishes a live, always-current static site on every push to main:
#   <pages-url>/            → full superset deck
#   <pages-url>/3day/       → canonical 3-day cut
#   <pages-url>/templates/  → design-system / templates gallery
#
# One-time manual prerequisite (no workflow can set it): in the repository,
# Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  build:
    name: Build decks (static SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build all three decks under the Pages base path
        # The base path MUST carry the exact case of the repo name: GitHub Pages
        # serves project sites at a case-sensitive path, and this repo is
        # "Kubernetes-Workshop", so the site lives at /Kubernetes-Workshop/.
        # We deliberately do NOT use steps.pages.outputs.base_path — it comes
        # back lowercased ("/kubernetes-workshop"), so the SPA shell loaded but
        # every asset 404'd and the deck rendered blank. github.event.repository
        # .name preserves the canonical case and is set on push + dispatch.
        env:
          BASE: /${{ github.event.repository.name }}
        run: |
          pnpm exec slidev build slides.md \
            --base "${BASE}/" --out site
          pnpm exec slidev build slides-3day.md \
            --base "${BASE}/3day/" --out site/3day
          pnpm exec slidev build slides-templates.md \
            --base "${BASE}/templates/" --out site/templates

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
